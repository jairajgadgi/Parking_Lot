name: Deploy Parking Lot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Application
        run: mvn clean package -DskipTests

      - name: Copy Jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: target/Parking-lot-0.0.1-SNAPSHOT.jar
          target: /home/ec2-user/

      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            pkill -f Parking-lot-0.0.1-SNAPSHOT.jar || true
            sleep 5
          
            export MYSQL_USERNAME=admin
            export MYSQL_PASSWORD=adminadmin
            export SPRING_DATASOURCE_URL='jdbc:mysql://parking-lot-db.chum4mcikyfd.eu-north-1.rds.amazonaws.com:3306/parkinglotdb?createDatabaseIfNotExist=true&serverTimezone=UTC'
          
            nohup java -jar /home/ec2-user/Parking-lot-0.0.1-SNAPSHOT.jar > /home/ec2-user/app.log 2>&1 < /dev/null &
          
            sleep 10
          
            pgrep -f Parking-lot-0.0.1-SNAPSHOT.jar